<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
     <link rel="icon" type="image" href="../static/img/Eqz7Dy-travel-world-transparent-logo.png">
    <title>Book Now</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <style>
        body {
            background: linear-gradient(rgba(0,0,0,0.5), rgba(0,0,0,0.5)), url('https://images.unsplash.com/photo-1469854523086-cc02fe5d8800?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .booking-card {
            background: rgba(255, 255, 255, 0.95);
            border: none;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.2);
            backdrop-filter: blur(10px);
        }
        .form-label {
            font-weight: 600;
            color: #444;
        }
        .btn-primary {
            background: #00c8ffb8;
            border: none;
            padding: 12px;
            font-weight: bold;
            border-radius: 10px;
            transition: 0.3s;
        }
        .btn-primary:hover {
            background: #0098b3;
            transform: translateY(-2px);
        }
        .input-group-text {
            background-color: #f8f9fa;
            border-right: none;
        }
        .form-control, .form-select {
            border-left: none;
            padding: 10px;
        }
        .form-control:focus, .form-select:focus {
            box-shadow: none;
            border-color: #dee2e6;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="row justify-content-center">
        <div class="col-md-6 col-lg-5">
            <div class="card booking-card p-4">
                <div class="text-center mb-4">
                    <h2 class="fw-bold text-info">Book Your Trip</h2>
                    <p class="text-muted">Explore the world with Travelverse</p>
                </div>

                <form action="{% url 'booking' %}" method="POST">
                    {% csrf_token %}
                    
                    <div class="mb-3">
                        <label class="form-label">Full Name</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa fa-user text-muted"></i></span>
                            <input type="text" name="customer_name" class="form-control" required placeholder="Enter your name">
                        </div>
                    </div>

                    <div class="mb-3">
                        <label class="form-label">Select Destination</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa fa-map-marker-alt text-muted"></i></span>
                    <select name="location" class="form-select" required>
    <option value="" selected disabled>Select Destination</option>
    <option value="Istanbul">Istanbul</option>
    <option value="Dubai">Dubai</option>
    <option value="Italy">Italy</option>
    <option value="London">London, UK</option>
    <option value="Texas">Texas, USA</option>
    <option value="Paris">Paris, France</option>
</select>
                        </div>
                    </div>

                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Check-in</label>
                            <input type="date" name="check_in" class="form-control" required style="border-left: 1px solid #dee2e6;">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label">Check-out</label>
                            <input type="date" name="check_out" class="form-control" required style="border-left: 1px solid #dee2e6;">
                        </div>
                    </div>

                    <div class="mb-4">
                        <label class="form-label">Total Guests</label>
                        <div class="input-group">
                            <span class="input-group-text"><i class="fa fa-users text-muted"></i></span>
                            <input type="number" name="guests" class="form-control" min="0" value="0">
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 shadow-sm">
                        Confirm Booking <i class="fa fa-paper-plane ms-2"></i>
                    </button>
                </form>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
